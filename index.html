<!DOCTYPE html>
<html>
<head>
<title>Kpop Beta Archetype Quiz</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 60px;
}

h1 {
  font-size: 42px;
}

button {
  padding: 16px 32px;
  font-size: 20px;
  background: #ff4081;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #e73370;
}
</style>

</head>

<body>

<h1>Kpop Dominant Archetype Quiz</h1>

<button onclick="startQuiz()">Start Quiz</button>

<div id="quiz" style="display:none; margin-top:30px;">
  <h2 id="question"></h2>

  <button id="optionA"
          onclick="answerChoice('A')"
          style="display:block;margin:12px auto;max-width:700px;white-space:normal;padding:14px;font-size:16px;">
  </button>

  <button id="optionB"
          onclick="answerChoice('B')"
          style="display:block;margin:12px auto;max-width:700px;white-space:normal;padding:14px;font-size:16px;">
  </button>
</div>

<div id="results" style="display:none; margin-top:40px;">
  <div id="resultText"></div>
</div>

<script src="quiz.js"></script>

</body>
</html>
