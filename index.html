<!DOCTYPE html>
<html>
<head>
<title>Kpop Beta Archetype Quiz</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding: 60px;
}

h1 {
  font-size: 42px;
}

button {
  padding: 16px 32px;
  font-size: 20px;
  background: #ff4081;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #e73370;
}
  #choiceContainer {
  display: flex;
  gap: 24px;
  justify-content: center;
  align-items: stretch;
  flex-wrap: wrap;
  margin-top: 24px;
}

.choice-card {
  width: 320px;
  min-height: 180px;
  padding: 24px;
  font-size: 20px;
  line-height: 1.4;
  white-space: normal;
  text-align: left;
  background: #1d1d1d;
  border: 2px solid #333;
  border-radius: 14px;
  color: white;
  cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}

.choice-card:hover {
  background: #2a2a2a;
  border-color: #ff4081;
  transform: translateY(-2px);
}
</style>

</head>

<body>

<h1>Kpop Dominant Archetype Quiz</h1>

<button onclick="startQuiz()">Start Quiz</button>

<div id="quiz" style="display:none; margin-top:30px;">
  <h2 id="question"></h2>

  <div id="choiceContainer">
    <button id="optionA" class="choice-card" onclick="answerChoice('A')"></button>
    <button id="optionB" class="choice-card" onclick="answerChoice('B')"></button>
  </div>
</div>

<div id="results" style="display:none; margin-top:40px;">
  <div id="resultText"></div>
</div>

<script src="quiz.js"></script>

</body>
</html>
